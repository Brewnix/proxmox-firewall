[defaults]
host_key_checking = False
inventory = inventory/
remote_user = root
private_key_file = ~/.ssh/id_rsa
timeout = 30
gathering = smart
fact_caching = memory
fact_caching_timeout = 3600
roles_path = ../../deployment/ansible/roles:../../common/ansible/roles
library = ../../deployment/ansible/library:../../common/ansible/library
filter_plugins = ../../deployment/ansible/filter_plugins:../../common/ansible/filter_plugins
callback_plugins = ../../deployment/ansible/callback_plugins:../../common/ansible/callback_plugins
# community.general.yaml removed in collection 12+; use builtin default + YAML (ansible-core 2.13+)
stdout_callback = ansible.builtin.default
callback_result_format = yaml
bin_ansible_callbacks = True

[inventory]
enable_plugins = advanced_host_list, constructed, host_list, script, auto, yaml, ini, toml

[paramiko_connection]
record_host_keys = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no
pipelining = True
control_path = /tmp/ansible-ssh-%%h-%%p-%%r

[persistent_connection]
command_timeout = 30

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False
