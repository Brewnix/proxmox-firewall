---
- name: Configure Proxmox VE host - clean community repos + hardening
  hosts: proxmox
  become: true
  gather_facts: true

  tasks:

    # === Repo Cleanup ===
    - name: Set correct Python interpreter (quiet warning on Proxmox 9)
      ansible.builtin.set_fact:
        ansible_python_interpreter: /usr/bin/python3

    - name: Ensure clean Proxmox no-subscription repo
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/proxmox.sources
        content: |
          Types: deb
          URIs: http://download.proxmox.com/debian/pve
          Suites: trixie
          Components: pve-no-subscription
          Architectures: amd64
          Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
        mode: '0644'

    - name: Ensure Ceph no-subscription repo (if ceph.sources exists)
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/ceph.sources
        content: |
          Types: deb
          URIs: http://download.proxmox.com/debian/ceph-squid
          Suites: trixie
          Components: no-subscription
          Architectures: amd64
          Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
        mode: '0644'
      when: lookup('fileglob', '/etc/apt/sources.list.d/ceph.sources', errors='ignore') | length > 0

    - name: Remove any old enterprise PVE sources file
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/pve-enterprise.sources
        state: absent

    - name: Update apt cache after repo cleanup
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install Ansible on Proxmox host (drive playbooks from the node; idempotent with lxc-golden-template.yml)
      ansible.builtin.apt:
        name: ansible
        state: present

    # === Nag Removal (persistent) ===
    - name: Remove subscription nag from JS
      ansible.builtin.replace:
        path: /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js
        regexp: 'if \(data\.status !== "Active"\)'
        replace: 'if (false)'

    - name: Make nag removal persistent
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/99proxmox-nag-removal
        content: |
          DPkg::Post-Invoke-Success {
            "sed -i 's/if (data\\.status !== \"Active\")/if (false)/g' /usr/share/javascript/proxmox-widget-toolkit/proxmoxlib.js && systemctl restart pveproxy || true";
          };
        mode: '0644'

    - name: Restart pveproxy
      ansible.builtin.systemd:
        name: pveproxy
        state: restarted

    # === Network Bridges - VLAN-aware setup matching network_devices.yaml ===
    - name: Configure VLAN-aware bridges for full network (fiber, Starlink, Omada, Camera, LAN)
      ansible.builtin.template:
        src: templates/network-interfaces.j2
        dest: /etc/network/interfaces
        owner: root
        group: root
        mode: '0644'
        backup: true
      notify: restart networking

    - name: Apply network configuration (ifreload)
      ansible.builtin.command: ifreload -a
      changed_when: false
      when: ansible_facts.packages['ifupdown2'] is defined  # safe on Proxmox

    # === Hardening ===
    - name: Install hardening packages
      ansible.builtin.apt:
        name:
          - unattended-upgrades
          - fail2ban
          - ufw
        state: present

    - name: Configure unattended-upgrades (security + updates)
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        content: |
          Unattended-Upgrade::Allowed-Origins {
            "${distro_id}:${distro_codename}-security";
            "${distro_id}:${distro_codename}-updates";
          };
          Unattended-Upgrade::Package-Blacklist { };
          Unattended-Upgrade::AutoFixInterruptedDpkg "true";
          Unattended-Upgrade::MinimalSteps "true";
          Unattended-Upgrade::InstallOnShutdown "false";
        mode: '0644'

    - name: Enable unattended-upgrades service
      ansible.builtin.systemd:
        name: unattended-upgrades
        enabled: true
        state: started

    - name: Harden SSH (key-only, no root, strong ciphers)
      ansible.builtin.blockinfile:
        path: /etc/ssh/sshd_config
        marker: "# ANSIBLE MANAGED BLOCK - SSH Hardening"
        block: |
          PermitRootLogin no
          PasswordAuthentication no
          PubkeyAuthentication yes
          PermitEmptyPasswords no
          MaxAuthTries 3
          ClientAliveInterval 300
          ClientAliveCountMax 0
          UsePAM yes
          Ciphers aes256-ctr,aes192-ctr,aes128-ctr
          MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
          KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group16-sha512
        state: present
      notify: restart ssh

    - name: Configure fail2ban for SSH and Proxmox web UI
      ansible.builtin.copy:
        dest: /etc/fail2ban/jail.local
        content: |
          [DEFAULT]
          bantime = 1h
          findtime = 10m
          maxretry = 4

          [sshd]
          enabled = true
          port = ssh
          filter = sshd
          logpath = /var/log/auth.log
          maxretry = 3

          [proxmox]
          enabled = true
          port = 8006
          filter = proxmox
          logpath = /var/log/daemon.log
          maxretry = 4
        mode: '0644'
      notify: restart fail2ban

    - name: Create fail2ban filter for Proxmox web UI
      ansible.builtin.copy:
        dest: /etc/fail2ban/filter.d/proxmox.conf
        content: |
          [Definition]
          failregex = pvedaemon\[.*\]: authentication failure; .* rhost=<HOST>
          ignoreregex =
        mode: '0644'
      notify: restart fail2ban

    # === UFW Firewall (fixed syntax) ===
    - name: Set UFW default incoming policy to deny
      community.general.ufw:
        direction: incoming
        default: deny

    - name: Set UFW default outgoing policy to allow
      community.general.ufw:
        direction: outgoing
        default: allow

    - name: Enable UFW firewall
      community.general.ufw:
        state: enabled

    # Bind allows to the LAN bridge (IN=vmbr2 in dmesg). Rules without "in on vmbr2" may not match bridged INPUT.
    - name: Allow SSH from Main Network (LAN bridge)
      community.general.ufw:
        rule: allow
        direction: in
        interface: "{{ proxmox_ufw_lan_interface | default('vmbr2') }}"
        to_port: "22"
        from_ip: "{{ proxmox_ufw_lan_cidr | default('192.168.0.0/24') }}"
        proto: tcp
        comment: SSH from LAN

    - name: Allow Proxmox Web UI (port 8006) from Main Network (LAN bridge)
      community.general.ufw:
        rule: allow
        direction: in
        interface: "{{ proxmox_ufw_lan_interface | default('vmbr2') }}"
        to_port: "8006"
        from_ip: "{{ proxmox_ufw_lan_cidr | default('192.168.0.0/24') }}"
        proto: tcp
        comment: Proxmox API from LAN

    # === Create Golden Debian 12 Cloud-Init Template ===
    - name: Ensure cloud-init image directory exists
      ansible.builtin.file:
        path: /var/lib/vz/template/iso
        state: directory
        mode: '0755'

    - name: Download latest Debian 12 generic cloud image
      ansible.builtin.get_url:
        url: https://cloud.debian.org/images/cloud/bookworm/latest/debian-12-genericcloud-amd64.qcow2
        dest: /var/lib/vz/template/iso/debian-12-genericcloud-amd64.qcow2
        mode: '0644'
        force: false   # only download if missing

    - name: Install libguestfs-tools for virt-customize
      ansible.builtin.apt:
        name: libguestfs-tools
        state: present

    - name: Install qemu-guest-agent inside the cloud image
      ansible.builtin.command: >
        virt-customize -a /var/lib/vz/template/iso/debian-12-genericcloud-amd64.qcow2
        --install qemu-guest-agent
      args:
        creates: /var/lib/vz/template/iso/debian-12-genericcloud-amd64.qcow2.bak   # idempotent

    # Use qm(1) on the node — no Proxmox HTTP API credentials (proxmox_kvm needs api_host/api_user).
    - name: Create base VM for template (ID 9000)
      ansible.builtin.command: >
        qm create 9000
        --name debian12-cloudinit-template
        --memory 2048
        --cores 2
        --net0 virtio,bridge=vmbr2
        --ostype l26
        --machine q35
        --scsihw virtio-scsi-pci
      args:
        creates: /etc/pve/nodes/{{ pve_node_name | default(inventory_hostname) }}/qemu-server/9000.conf

    - name: Import cloud image disk to the template VM
      ansible.builtin.shell: |
        cfg="/etc/pve/nodes/{{ pve_node_name | default(inventory_hostname) }}/qemu-server/9000.conf"
        # Skip if scsi0 is already wired up in the VM config
        if grep -q '^scsi0:' "$cfg" 2>/dev/null; then
          echo "already_imported"
          exit 0
        fi
        qm importdisk 9000 /var/lib/vz/template/iso/debian-12-genericcloud-amd64.qcow2 local-lvm
      args:
        executable: /bin/bash
      register: qm_import_9000
      changed_when: "'already_imported' not in qm_import_9000.stdout"

    - name: Configure the template VM disk and Cloud-Init
      ansible.builtin.shell: |
        cfg="/etc/pve/nodes/{{ pve_node_name | default(inventory_hostname) }}/qemu-server/9000.conf"
        # Skip if already fully configured (scsi0 + ide2 + serial0 all present)
        if grep -q '^scsi0:' "$cfg" 2>/dev/null && grep -q '^ide2:' "$cfg" 2>/dev/null && grep -q '^serial0:' "$cfg" 2>/dev/null; then
          echo "already_configured"
          exit 0
        fi
        # importdisk registers the volume as vm-9000-disk-0; after qm template it becomes base-9000-disk-0.
        # Use whichever exists.
        if lvs pve/base-9000-disk-0 &>/dev/null; then
          disk_ref="local-lvm:base-9000-disk-0"
        else
          disk_ref="local-lvm:vm-9000-disk-0"
        fi
        qm set 9000 \
          --scsi0 "${disk_ref},discard=on,ssd=1" \
          --ide2 local-lvm:cloudinit \
          --boot c --bootdisk scsi0 \
          --serial0 socket --vga serial0 \
          --agent enabled=1 \
          --ciuser ansible \
          --sshkeys /home/ansible/.ssh/authorized_keys
      args:
        executable: /bin/bash
      register: qm_cfg_9000
      changed_when: "'already_configured' not in qm_cfg_9000.stdout"

    - name: Convert VM to template
      ansible.builtin.shell: |
        cfg="/etc/pve/nodes/{{ pve_node_name | default(inventory_hostname) }}/qemu-server/9000.conf"
        if [ -f "$cfg" ] && grep -q '^template: 1' "$cfg"; then
          echo "already_template"
          exit 0
        fi
        qm template 9000
      args:
        executable: /bin/bash
      register: qm_tpl_9000
      changed_when: "'already_template' not in qm_tpl_9000.stdout"

  handlers:
    - name: restart ssh
      ansible.builtin.systemd:
        name: ssh
        state: restarted

    - name: restart fail2ban
      ansible.builtin.systemd:
        name: fail2ban
        state: restarted

    - name: restart networking
      ansible.builtin.command: ifreload -a
      changed_when: false
