#cloud-config
# Target Tailscale: 1.96.4 (apt pin). Repo URL uses Debian codename from /etc/os-release.
hostname: tailscale
fqdn: tailscale.brewnix.lan

users:
  - name: ansible
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - ${ssh_public_key}

package_update: true
package_upgrade: true

packages:
  - curl

runcmd:
  - bash -lc 'CODENAME=$(. /etc/os-release && echo "$VERSION_CODENAME"); curl -fsSL "https://pkgs.tailscale.com/stable/debian/${CODENAME}.noarmor.gpg" | tee /usr/share/keyrings/tailscale-archive-keyring.gpg >/dev/null; curl -fsSL "https://pkgs.tailscale.com/stable/debian/${CODENAME}.tailscale-keyring.list" | tee /etc/apt/sources.list.d/tailscale.list'
  - apt-get update
  - apt-get install -y 'tailscale=1.96.4*'
  - tailscale up --authkey=${tailscale_auth_key} --advertise-routes=192.168.0.0/16 --accept-routes
  - echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf
  - sysctl -p

write_files:
  - path: /etc/systemd/system/tailscale.service.d/override.conf
    content: |
      [Service]
      Environment=TS_EXTRA_ARGS=--advertise-routes=192.168.0.0/16
